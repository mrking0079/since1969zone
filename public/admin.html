<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Since1969Zone Admin</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #060b16;
      color: #fff;
      padding: 20px;
    }
    .box {
      max-width: 900px;
      margin: 40px auto;
      background: #10192b;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 0 30px rgba(0,0,0,0.35);
    }
    h1 {
      text-align: center;
      color: gold;
      margin-top: 0;
      margin-bottom: 24px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #2a3550;
      background: #0a1020;
      color: #fff;
      font-size: 15px;
    }
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, gold, orange);
      color: #111;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .full {
      width: 100%;
    }
    .hidden {
      display: none;
    }
    pre {
      background: #070c18;
      padding: 14px;
      border-radius: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 120px;
    }
    #loginMsg {
      margin-bottom: 12px;
      color: #ffd54a;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Since1969Zone Admin Panel</h1>

    <div id="loginSection">
      <input id="adminUsername" type="text" placeholder="Admin username" />
      <input id="adminPassword" type="password" placeholder="Admin password" />
      <button class="full" onclick="adminLogin()">Admin Login</button>
      <div id="loginMsg">Pehle admin login karo.</div>
    </div>

    <div id="panelSection" class="hidden">
      <button onclick="loadUsers()">Load Users</button>
<div id="selectedUserInfo" style="margin:12px 0;padding:12px 14px;background:linear-gradient(135deg,#111827,#0b1220);border:1px solid #3a4b63;border-radius:12px;color:#ffd54a;box-shadow:0 0 14px rgba(255,213,74,0.08);font-weight:600;">No user selected</div>

<button onclick="toggleBlockUser()" style="margin-bottom:10px;background:#ff4d4f;color:#fff;">
  Block / Unblock User
</button>
<input id="coinUsername" type="text" placeholder="Username to add coins" />
<input id="coinAmount" type="number" placeholder="Coins amount" />
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
  <button onclick="addCoins()" style="margin-bottom:0;">Add Coins</button>
  <button onclick="withdrawCoins()" style="margin-bottom:0;">Withdraw Coins</button>
<button onclick="loadTransactions()" style="margin-bottom:0;">Transaction History</button>
<button onclick="loadCurrentRound()" style="margin-bottom:0;">Round Control</button>
<button onclick="loadDepositRequests()" style="margin-bottom:0;">Deposit Requests</button>
  <button onclick="adminLogout()" style="margin-bottom:0;">Logout</button>
</div>
<input id="userSearch" type="text" placeholder="Search user by username" oninput="filterUsers()" />
      <div id="usersList" style="margin-top:16px;"></div>
<pre id="output">Admin action results will appear here....</pre>

<div id="transactionsPanel" style="margin-top:16px;display:none;">
  <h3 style="margin:0 0 10px 0;color:#ffd54a;">Transaction History</h3>
  <div id="transactionsList" style="display:grid;gap:10px;"></div>
</div>

<div id="roundPanel" style="margin-top:16px;display:none;">
  <h3 style="margin:0 0 10px 0;color:#ffd54a;">Round Control</h3>
  <div id="roundInfo" style="background:#111827;border:1px solid #243041;border-radius:14px;padding:14px;line-height:1.8;">
    Round info will appear here...
  </div>
  <div style="margin-top:12px;">
    <button onclick="forceSettleRound()" style="background:#ff9800;color:#111;">Force Settle Round</button>
  </div>
</div>
<div id="depositRequestsPanel" style="margin-top:16px;display:none;">
  <h3 style="margin:0 0 10px 0;color:#ffd54a;">Deposit Requests</h3>
  <div id="depositRequestsList" style="display:grid;gap:10px;"></div>
</div>
    </div>
  </div>

<script>
  let allUsers = [];
let selectedUsername = '';
    function checkAdminLogin() {
      const token = localStorage.getItem('adminSessionToken') || '';
      document.getElementById('loginSection').classList.toggle('hidden', !!token);
      document.getElementById('panelSection').classList.toggle('hidden', !token);
    }

    async function adminLogin() {
      const username = document.getElementById('adminUsername').value.trim();
      const password = document.getElementById('adminPassword').value.trim();
      const loginMsg = document.getElementById('loginMsg');

      if (!username) {
        loginMsg.textContent = 'Username required';
        return;
      }

      if (!password) {
        loginMsg.textContent = 'Password required';
        return;
      }

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          loginMsg.textContent = data.error || 'Login failed';
          return;
        }

        if (String(data.user?.username || '').toLowerCase() !== 'admin') {
          loginMsg.textContent = 'Admin account only';
          return;
        }

        localStorage.setItem('adminSessionToken', data.user.sessionToken || '');
        loginMsg.textContent = 'Admin login successful';
        checkAdminLogin();
loadUsers();
      } catch (err) {
        loginMsg.textContent = 'Server error';
      }
    }

    async function loadUsers() {
  const token = localStorage.getItem('adminSessionToken') || '';
  const output = document.getElementById('output');
  const usersList = document.getElementById('usersList');

  if (!token) {
    output.textContent = 'Admin login required';
    return;
  }

  try {
    const res = await fetch('/api/admin/users', {
      headers: {
        'x-auth-token': token
      }
    });

    const data = await res.json();

    if (!res.ok) {
      output.textContent = 'Error ' + res.status + ': ' + (data.error || 'Access denied');
      return;
    }

    const users = Array.isArray(data.users) ? data.users : [];
allUsers = users;

    if (!users.length) {
      usersList.innerHTML = '<div style="padding:12px;background:#111827;border-radius:10px;">No users found</div>';
      output.textContent = 'Users loaded';
      return;
    }

    filterUsers();

  } catch (err) {
    output.textContent = 'Failed to load users: ' + err.message;
  }
}

function filterUsers() {
  const query = document.getElementById('userSearch').value.toLowerCase();
  const usersList = document.getElementById('usersList');

  let filtered = allUsers.filter(user =>
  String(user.username).toLowerCase().includes(query)
);

if (selectedUsername) {
  const selectedUserExists = filtered.some(
    user => String(user.username) === String(selectedUsername)
  );

  if (!selectedUserExists) {
    const selectedUser = allUsers.find(
      user => String(user.username) === String(selectedUsername)
    );

    if (selectedUser) {
      filtered = [selectedUser, ...filtered];
    }
  }
}

  if (!filtered.length) {
    usersList.innerHTML = '<div style="padding:12px;background:#111827;border-radius:10px;">No users found</div>';
    return;
  }

  usersList.innerHTML = filtered.map(user => `
    <div onclick="selectUser('${user.username}')" style="background:${selectedUsername === user.username ? '#1a2a44' : user.blocked ? '#2a1014' : '#111827'};border:1px solid ${selectedUsername === user.username ? '#ffd54a' : user.blocked ? '#ff4d4f' : '#243041'};border-radius:14px;padding:12px;margin-bottom:10px;cursor:pointer;transition:all 0.2s ease;box-shadow:${selectedUsername === user.username ? '0 0 16px rgba(255,213,74,0.12)' : user.blocked ? '0 0 12px rgba(255,77,79,0.10)' : '0 0 0 rgba(0,0,0,0)'};" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
      <div><strong>Username:</strong> ${user.username}</div>
      <div><strong>Wallet:</strong> ${user.walletBalance}</div>
      <div><strong>Total Played:</strong> ${user.totalPlayed}</div>
      <div><strong>Total Wins:</strong> ${user.totalWins}</div>
      <div><strong>Bonus Claimed:</strong> ${user.bonusClaimed}</div>
      <div><strong>Status:</strong> ${user.blocked ? 'Blocked' : 'Active'}</div>
    </div>
  `).join('');
}
function selectUser(username) {
selectedUsername = username;
  document.getElementById('coinUsername').value = username;

  const userCards = document.querySelectorAll('#usersList > div');
  let walletText = '';

  userCards.forEach(card => {
    const text = card.innerText || '';
    if (text.includes('Username: ' + username)) {
      const lines = text.split('\n');
      const walletLine = lines.find(line => line.includes('Wallet:'));
      walletText = walletLine ? walletLine.trim() : '';
    }
  });

    const selectedUser = allUsers.find(
    user => String(user.username) === String(username)
  );

  const blockedText = selectedUser && selectedUser.blocked ? 'Blocked' : 'Active';

  document.getElementById('selectedUserInfo').textContent =
    walletText
      ? `Selected user: ${username} | ${walletText} | Blocked: ${blockedText}`
      : `Selected user: ${username} | Blocked: ${blockedText}`;

  document.getElementById('output').textContent = 'Selected user: ' + username;
document.querySelector('button[onclick="toggleBlockUser()"]').textContent = blockedText === 'Blocked' ? 'Unblock User' : 'Block User';
filterUsers();
}
async function addCoins() {
  const token = localStorage.getItem('adminSessionToken') || '';
  const username = document.getElementById('coinUsername').value.trim();
  const amount = Number(document.getElementById('coinAmount').value);
  const output = document.getElementById('output');

  if (!token) {
    output.textContent = 'Admin login required';
    return;
  }

  if (!username) {
    output.textContent = 'Username required';
    return;
  }

  if (!Number.isInteger(amount) || amount <= 0) {
    output.textContent = 'Valid amount required';
    return;
  }

if (!confirm(`Add ${amount} coins to ${username}?`)) {
  return;
}
  try {
    const res = await fetch('/api/admin/add-coins', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-auth-token': token
      },
      body: JSON.stringify({ username, amount })
    });

    const data = await res.json();

    if (!res.ok) {
      output.textContent = 'Error ' + res.status + ': ' + (data.error || 'Failed');
      return;
    }

    output.textContent = data.message + ' | New Wallet: ' + data.user.walletBalance;

document.getElementById('selectedUserInfo').textContent =
  'Selected user: ' + data.user.username + ' | Wallet: ' + data.user.walletBalance;
document.getElementById('coinAmount').value = '';
document.getElementById('userSearch').value = '';
loadUsers();
  } catch (err) {
    output.textContent = 'Failed to add coins: ' + err.message;
  }
}
async function withdrawCoins() {
  const token = localStorage.getItem('adminSessionToken') || '';
  const username = document.getElementById('coinUsername').value.trim();
  const amount = Number(document.getElementById('coinAmount').value);
  const output = document.getElementById('output');

  if (!token) {
    output.textContent = 'Admin login required';
    return;
  }

  if (!username) {
    output.textContent = 'Username required';
    return;
  }

  if (!Number.isInteger(amount) || amount <= 0) {
    output.textContent = 'Valid amount required';
    return;
  }

if (!confirm(`Withdraw ${amount} coins to ${username}?`)) {
  return;
}
  try {
    const res = await fetch('/api/admin/withdraw-coins', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-auth-token': token
      },
      body: JSON.stringify({ username, amount })
    });

    const data = await res.json();

    if (!res.ok) {
      output.textContent = 'Error ' + res.status + ': ' + (data.error || 'Failed');
      return;
    }

    output.textContent = data.message + ' | New Wallet: ' + data.user.walletBalance;

document.getElementById('selectedUserInfo').textContent =
  'Selected user: ' + data.user.username + ' | Wallet: ' + data.user.walletBalance;
document.getElementById('coinAmount').value = '';
document.getElementById('userSearch').value = '';
loadUsers();
  } catch (err) {
    output.textContent = 'Failed to withdraw coins: ' + err.message;
  }
}

async function toggleBlockUser() {
  const token = localStorage.getItem('adminSessionToken') || '';
  const username = document.getElementById('coinUsername').value.trim();
  const output = document.getElementById('output');

  if (!token) {
    output.textContent = 'Admin login required';
    return;
  }

  if (!username) {
    output.textContent = 'Select a user first';
    return;
  }

  const selectedUser = allUsers.find(
    user => String(user.username).toLowerCase() === username.toLowerCase()
  );

  if (!selectedUser) {
    output.textContent = 'User not found in list';
    return;
  }

  const newBlockedState = !selectedUser.blocked;

  if (!confirm(`${newBlockedState ? 'Block' : 'Unblock'} user ${username}?`)) {
    return;
  }

  try {
    const res = await fetch('/api/admin/toggle-block-user', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-auth-token': token
      },
      body: JSON.stringify({
        username,
        blocked: newBlockedState
      })
    });

    const data = await res.json();

    if (!res.ok) {
      output.textContent = 'Error ' + res.status + ': ' + (data.error || 'Failed');
      return;
    }

    output.textContent = data.message;

        document.getElementById('selectedUserInfo').textContent =
      `Selected user: ${data.user.username} | Blocked: ${data.user.blocked ? 'Blocked' : 'Active'}`;

document.querySelector('button[onclick="toggleBlockUser()"]').textContent =
      data.user.blocked ? 'Unblock User' : 'Block User';

    loadUsers();
  } catch (err) {
    output.textContent = 'Failed to update block status: ' + err.message;
  }
}

async function loadCurrentRound() {
  const token = localStorage.getItem('adminSessionToken') || '';
  const output = document.getElementById('output');
  const roundPanel = document.getElementById('roundPanel');
  const roundInfo = document.getElementById('roundInfo');

  if (!token) {
    output.textContent = 'Admin login required';
    return;
  }

  roundPanel.style.display = 'block';
  roundInfo.innerHTML = 'Loading round info...';

  try {
    const res = await fetch('/api/admin/current-round', {
      headers: {
        'x-auth-token': token
      }
    });

    const data = await res.json();

    if (!res.ok) {
      output.textContent = 'Error ' + res.status + ': ' + (data.error || 'Failed');
      roundInfo.innerHTML = 'Failed to load round info';
      return;
    }

    const round = data.round;

    roundInfo.innerHTML = `
      <div><strong>Round Number:</strong> ${round.roundNumber}</div>
      <div><strong>Round Code:</strong> ${round.roundCode}</div>
      <div><strong>Status:</strong> ${round.status}</div>
      <div><strong>Start Time:</strong> ${new Date(round.startsAt).toLocaleString()}</div>
      <div><strong>Bet Close Time:</strong> ${new Date(round.bettingClosesAt).toLocaleString()}</div>
      <div><strong>End Time:</strong> ${new Date(round.endsAt).toLocaleString()}</div>
      <div><strong>Server Seed Hash:</strong> ${round.serverSeedHash}</div>
      <div><strong>Client Seed:</strong> ${round.clientSeed}</div>
    `;

    output.textContent = 'Current round loaded';
  } catch (err) {
    roundInfo.innerHTML = 'Failed to load round info';
    output.textContent = 'Failed to load round: ' + err.message;
  }
}

async function forceSettleRound() {
  const token = localStorage.getItem('adminSessionToken') || '';
  const output = document.getElementById('output');

  if (!token) {
    output.textContent = 'Admin login required';
    return;
  }

  if (!confirm('Are you sure you want to force settle the current round?')) {
    return;
  }

  try {
    const res = await fetch('/api/admin/settle', {
      method: 'POST',
      headers: {
        'x-auth-token': token
      }
    });

    const data = await res.json();

    if (!res.ok) {
      output.textContent = 'Error ' + res.status + ': ' + (data.error || 'Failed');
      return;
    }

    output.textContent = data.message || 'Round settled successfully';
    loadCurrentRound();
    loadTransactions();
  } catch (err) {
    output.textContent = 'Failed to settle round: ' + err.message;
  }
}

async function handleDepositRequest(requestId, action) {
  const token = localStorage.getItem('adminSessionToken') || '';
  const output = document.getElementById('output');

  if (!token) {
    output.textContent = 'Admin login required';
    return;
  }

  if (!confirm(`Are you sure you want to ${action} this deposit request?`)) {
    return;
  }

  try {
    const res = await fetch('/api/admin/deposit-requests/action', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-auth-token': token
      },
      body: JSON.stringify({
        requestId,
        action
      })
    });

    const data = await res.json();

    if (!res.ok) {
      output.textContent = 'Error ' + res.status + ': ' + (data.error || 'Failed');
      return;
    }

    output.textContent = data.message || 'Deposit request updated';
    loadDepositRequests();
    loadUsers();
    loadTransactions();
  } catch (err) {
    output.textContent = 'Failed to update deposit request: ' + err.message;
  }
}

async function loadDepositRequests() {
  const token = localStorage.getItem('adminSessionToken') || '';
  const output = document.getElementById('output');
  const panel = document.getElementById('depositRequestsPanel');
  const list = document.getElementById('depositRequestsList');

  if (!token) {
    output.textContent = 'Admin login required';
    return;
  }

  panel.style.display = 'block';
  list.innerHTML = '<div style="padding:12px;background:#111827;border-radius:10px;">Loading deposit requests...</div>';

  try {
    const res = await fetch('/api/admin/deposit-requests', {
      headers: {
        'x-auth-token': token
      }
    });

    const data = await res.json();

    if (!res.ok) {
      output.textContent = 'Error ' + res.status + ': ' + (data.error || 'Failed');
      list.innerHTML = '';
      return;
    }

    if (!data.requests || !data.requests.length) {
      list.innerHTML = '<div style="padding:12px;background:#111827;border-radius:10px;">No deposit requests found</div>';
      output.textContent = 'Deposit requests loaded';
      return;
    }

    list.innerHTML = data.requests.map(reqItem => {
      const dateText = reqItem.createdAt
        ? new Date(reqItem.createdAt).toLocaleString()
        : '-';

      return `
        <div style="background:#111827;border:1px solid #243041;border-radius:14px;padding:12px;">
          <div><strong>User:</strong> ${reqItem.username}</div>
          <div><strong>Amount:</strong> ${reqItem.amount}</div>
          <div><strong>Method:</strong> ${reqItem.method}</div>
          <div><strong>UTR:</strong> ${reqItem.utr}</div>
          <div><strong>Status:</strong> ${reqItem.status}</div>
          <div><strong>Time:</strong> ${dateText}</div>
          ${reqItem.status === 'pending' ? `
  <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;">
    <button onclick="handleDepositRequest(${reqItem.id}, 'approve')" style="background:#22c55e;color:#111;">Approve</button>
    <button onclick="handleDepositRequest(${reqItem.id}, 'reject')" style="background:#ff4d4f;color:#fff;">Reject</button>
  </div>
` : ''}
        </div>
      `;
    }).join('');

    output.textContent = 'Deposit requests loaded';
  } catch (err) {
    list.innerHTML = '';
    output.textContent = 'Failed to load deposit requests: ' + err.message;
  }
}

async function loadTransactions() {
  const token = localStorage.getItem('adminSessionToken') || '';
  const output = document.getElementById('output');
  const panel = document.getElementById('transactionsPanel');
  const list = document.getElementById('transactionsList');

  if (!token) {
    output.textContent = 'Admin login required';
    return;
  }

  panel.style.display = 'block';
  list.innerHTML = '<div style="padding:12px;background:#111827;border-radius:10px;">Loading transactions...</div>';

  try {
    const res = await fetch('/api/admin/transactions', {
      headers: {
        'x-auth-token': token
      }
    });

    const data = await res.json();

    if (!res.ok) {
      output.textContent = 'Error ' + res.status + ': ' + (data.error || 'Failed');
      list.innerHTML = '';
      return;
    }

    if (!data.transactions || !data.transactions.length) {
      list.innerHTML = '<div style="padding:12px;background:#111827;border-radius:10px;">No transactions found</div>';
      output.textContent = 'Transaction history loaded';
      return;
    }

    list.innerHTML = data.transactions.map(tx => {
      const dateText = tx.createdAt
        ? new Date(tx.createdAt).toLocaleString()
        : '-';

      return `
        <div style="background:#111827;border:1px solid #243041;border-radius:14px;padding:12px;">
          <div><strong>User:</strong> ${tx.username}</div>
          <div><strong>Type:</strong> ${tx.type}</div>
          <div><strong>Amount:</strong> ${tx.amount}</div>
          <div><strong>Time:</strong> ${dateText}</div>
        </div>
      `;
    }).join('');

    output.textContent = 'Transaction history loaded';
  } catch (err) {
    list.innerHTML = '';
    output.textContent = 'Failed to load transactions: ' + err.message;
  }
}

    function adminLogout() {
      localStorage.removeItem('adminSessionToken');
      checkAdminLogin();
      document.getElementById('output').textContent = 'Admin action results will appear here....';
document.getElementById('usersList').innerHTML = '';
document.getElementById('selectedUserInfo').textContent = 'No user selected';
document.getElementById('userSearch').value = '';
selectedUsername = '';
document.getElementById('coinUsername').value = '';
document.getElementById('coinAmount').value = '';
document.getElementById('transactionsPanel').style.display = 'none';
document.getElementById('roundPanel').style.display = 'none';
document.getElementById('depositRequestsPanel').style.display = 'none';
      document.getElementById('loginMsg').textContent = 'Logged out';
    }

    checkAdminLogin();
  </script>
</body>
</html>
