<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Since1969Zone Admin</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: #fff;
      padding: 20px;
    }

    .box {
      max-width: 900px;
      margin: auto;
      background: #121a2a;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 0 25px rgba(0,0,0,0.35);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: gold;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, gold, orange);
      color: #111;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 15px;
    }

    pre {
      background: #0a0f18;
      padding: 14px;
      border-radius: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Since1969Zone Admin Panel</h1>
    <button onclick="loadUsers()">Load Users</button>
<div id="tokenInfo" style="margin:10px 0 14px;color:#ffd54a;font-size:14px;">Token check yaha dikhega...</div>
    <pre id="output">Admin data yaha dikhega...</pre>
  </div>

  <script>
    async function loadUsers() {
  const token = localStorage.getItem('sessionToken') || sessionStorage.getItem('sessionToken') || localStorage.getItem('token') || sessionStorage.getItem('token');
  const output = document.getElementById('output');
const tokenInfo = document.getElementById('tokenInfo');
tokenInfo.textContent = 'Token on admin page: ' + (token || 'NOT FOUND');

  if (!token) {
    output.textContent = '❌ Admin login required. Pehle main site par login karo.';
    return;
  }

  try {
    const res = await fetch('/api/admin/users', {
      headers: {
        'x-auth-token': token
      }
    });

    const data = await res.json();

if (data.user?.sessionToken) {
  localStorage.setItem('sessionToken', data.user.sessionToken);
  localStorage.setItem('username', data.user.username || '');
}
if (data.user?.sessionToken) {
  localStorage.setItem('sessionToken', data.user.sessionToken);
  localStorage.setItem('username', data.user.username || '');
}
    if (!res.ok) {
      output.textContent = '❌ ' + (data.error || 'Access denied');
      return;
    }

    output.textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    output.textContent = '❌ Server error';
  }
}
  </script>
</body>
</html>
