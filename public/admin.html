<!DOCTYPE html>
<html>
<head><title>Admin</title></head>
<body>

<input id="coinUsername" />
<input id="coinAmount" />

<div id="selectedUserInfo"></div>

<script>
let selectedUserId = null;

function selectUser(user){
  selectedUserId = user.id;
  document.getElementById('coinUsername').value = user.username;
  document.getElementById('selectedUserInfo').innerHTML =
    "User: " + user.username + " ID: " + user.id;
}

async function addCoins(){
  const amount = Number(document.getElementById('coinAmount').value);
  if(!selectedUserId){ alert("Select user first"); return; }

  const res = await fetch('/api/admin/add-coin',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ userId: selectedUserId, amount })
  });

  alert(await res.text());
}

async function withdrawCoins(){
  const amount = Number(document.getElementById('coinAmount').value);
  if(!selectedUserId){ alert("Select user first"); return; }

  const res = await fetch('/api/admin/withdraw-coin',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ userId: selectedUserId, amount })
  });

  alert(await res.text());
}
</script>

</body>
</html>
