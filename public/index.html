  </div>

  <!-- HISTORY -->

  <div id="historyBox" class="card" style="display:none;">
    <h3>Last Results</h3>
    <div id="historyList" class="history-list"></div>
  </div>

  <script>
    let currentUser = null;
    let latestRound = null;

    // =========================
    // API HELPER
    // =========================
    async function api(url, options = {}) {
      const headers = {
        "Content-Type": "application/json",
        ...(options.headers || {})
      };

      if (currentUser?.id) {
        headers["x-user-id"] = String(currentUser.id);
      }

      const res = await fetch(url, {
        method: options.method || "GET",
        headers,
        body: options.body || undefined
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        throw new Error(data.error || "Request failed");
      }

      return data;
    }

    // =========================
    // UI HELPERS
    // =========================
    function showMessage(text, type = "muted") {
      const el = document.getElementById("message");
      el.className = type;
      el.innerText = text || "";
    }

    function showGame() {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("gameBox").style.display = "block";
      document.getElementById("historyBox").style.display = "block";
    }

    function showLogin() {
      document.getElementById("loginBox").style.display = "block";
      document.getElementById("gameBox").style.display = "none";
      document.getElementById("historyBox").style.display = "none";
    }

    // =========================
    // LOGIN
    // =========================
    async function login() {
      try {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!username) return alert("Username daalo");
        if (!password) return alert("Password daalo");

        const data = await api("/api/login", {
          method: "POST",
          body: JSON.stringify({ username, password })
        });

        currentUser = data.user;
        localStorage.setItem("since1969_user", JSON.stringify(currentUser));

        showGame();
        showMessage("Login successful", "good");
        await loadState();
      } catch (err) {
        alert(err.message || "Login failed");
      }
    }

    // =========================
    // LOGOUT
    // =========================
    function logout() {
      currentUser = null;
      latestRound = null;
      localStorage.removeItem("since1969_user");
      showLogin();
      showMessage("");
    }

    // =========================
    // RESTORE USER
    // =========================
    function restoreUser() {
  try {
    const saved = localStorage.getItem("since1969_user");
    if (!saved) return;

    const parsed = JSON.parse(saved);

    if (!parsed || !parsed.id || !parsed.username) {
      localStorage.removeItem("since1969_user");
      currentUser = null;
      return;
    }

    currentUser = {
      id: Number(parsed.id),
      username: parsed.username
    };

    showGame();
    loadState();
  } catch {
    localStorage.removeItem("since1969_user");
    currentUser = null;
  }
}

    // =========================
    // LOAD STATE
    // =========================
    async function loadState() {
      if (!currentUser?.id) return;

      try {
        const state = await api("/api/state");
        latestRound = state.round || null;

        document.getElementById("user").innerText = state.user?.username || "-";
        document.getElementById("balance").innerText = state.balance ?? 0;
        document.getElementById("round").innerText = state.round?.round_number ?? "-";

        if (state.round?.lucky_number !== null && state.round?.lucky_number !== undefined) {
          document.getElementById("result").innerText = state.round.lucky_number;
        }

        updateTimer();
        renderHistory(state.lastResults || []);
      } catch (err) {
        console.error("STATE LOAD ERROR:", err.message);
        showMessage(err.message || "State load failed", "bad");
      }
    }

    // =========================
    // TIMER
    // =========================
    function updateTimer() {
      if (!latestRound) return;

      const now = Date.now();
      const end = latestRound.ends_at;
      const close = latestRound.betting_closes_at;

      let remaining = Math.floor((end - now) / 1000);
      if (remaining < 0) remaining = 0;

      document.getElementById("timer").innerText = remaining + "s";

      if (now >= close) {
        document.getElementById("betStatus").innerText = "Betting Closed";
      } else {
        document.getElementById("betStatus").innerText = "Betting Open";
      }
    }

    // =========================
    // BUILD NUMBER BUTTONS
    // =========================
    function buildNumbers() {
      const box = document.getElementById("numbers");
      box.innerHTML = "";

      for (let i = 0; i <= 9; i++) {
        const btn = document.createElement("button");
        btn.className = "num-btn";
        btn.innerText = i;
        btn.onclick = () => placeBet(i);
        box.appendChild(btn);
      }
    }

    // =========================
    // PLACE BET
    // =========================
    async function placeBet(num) {
      if (!currentUser?.id) return alert("Login first");

      try {
        await api("/api/bet", {
          method: "POST",
          body: JSON.stringify({
            betMap: {
              [num]: 10
            }
          })
        });

        showMessage(`Bet placed on ${num}`, "good");
        await loadState();
      } catch (err) {
        alert(err.message || "Bet failed");
      }
    }

    // =========================
    // BONUS
    // =========================
    async function claimBonus() {
      if (!currentUser?.id) return alert("Login first");

      try {
        const data = await api("/api/bonus", {
          method: "POST"
        });

        showMessage(data.message || "Bonus claimed", "good");
        await loadState();
      } catch (err) {
        alert(err.message || "Bonus failed");
      }
    }

    // =========================
    // HISTORY
    // =========================
    function renderHistory(results) {
      const box = document.getElementById("historyList");
      box.innerHTML = "";

      if (!results.length) {
        box.innerHTML = '<div class="muted">Abhi koi result nahi hai</div>';
        return;
      }

      results.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
          <strong>Round ${item.round_number}</strong><br>
          Result: <strong>${item.lucky_number}</strong>
        `;
        box.appendChild(div);
      });
    }

    // =========================
    // INIT
    // =========================
    buildNumbers();
    restoreUser();

    setInterval(() => {
      if (currentUser?.id) loadState();
    }, 3000);

    setInterval(() => {
      if (currentUser?.id) updateTimer();
    }, 1000);
  </script>

</body>
</html>
