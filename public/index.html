<script>
let currentUser = null;

// API helper
async function api(url, options = {}) {
const res = await fetch(url, {
headers: {
"Content-Type": "application/json"
},
credentials: "include",
...options
});

if (!res.ok) throw new Error("API error");
return res.json();
}

// LOGIN
async function login() {
const username = document.getElementById("username").value.trim();
if (!username) return alert("Enter username");

const data = await api("/api/login", {
method: "POST",
body: JSON.stringify({ username })
});

currentUser = data.user;
localStorage.setItem("user", JSON.stringify(currentUser));

document.getElementById("loginBox").style.display = "none";
document.querySelector(".wrap").style.display = "block";

loadState();
}

// LOGOUT
function logout() {
localStorage.removeItem("user");
location.reload();
}

// RESTORE SESSION
function restoreUser() {
const saved = localStorage.getItem("user");
if (saved) {
try {
currentUser = JSON.parse(saved);
document.getElementById("loginBox").style.display = "none";
document.querySelector(".wrap").style.display = "block";
loadState();
} catch {
localStorage.removeItem("user");
}
}
}

// LOAD GAME STATE
async function loadState() {
try {
const state = await api("/api/state");

```
document.getElementById("balance").innerText = state.balance || 0;
document.getElementById("round").innerText = state.round?.round_number || "-";

if (state.round?.lucky_number !== null) {
  document.getElementById("result").innerText = state.round.lucky_number;
}

updateTimer(state.round);
```

} catch (e) {
console.log("state load failed");
}
}

// TIMER
function updateTimer(round) {
if (!round) return;

const now = Date.now();
const end = round.ends_at;
const close = round.betting_closes_at;

let remaining = Math.floor((end - now) / 1000);
if (remaining < 0) remaining = 0;

document.getElementById("timer").innerText = remaining + "s";

if (now > close) {
document.getElementById("betStatus").innerText = "Betting Closed";
} else {
document.getElementById("betStatus").innerText = "Betting Open";
}
}

// PLACE BET
async function placeBet(num) {
if (!currentUser) return alert("Login first");

try {
await api("/api/bet", {
method: "POST",
body: JSON.stringify({ number: num, amount: 10 })
});

```
loadState();
```

} catch {
alert("Bet failed");
}
}

// INIT
restoreUser();

// AUTO REFRESH
setInterval(() => {
if (currentUser) loadState();
}, 3000);

// TIMER LOOP
setInterval(() => {
loadState();
}, 1000);

</script>
