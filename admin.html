<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Since1969zone Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    .box {
      max-width: 700px;
      margin: 40px auto;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(255,255,255,0.08);
    }
    h1 {
      margin-top: 0;
      text-align: center;
    }
    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 8px;
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
    button {
      background: #ff9800;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .log {
      background: #000;
      padding: 12px;
      border-radius: 8px;
      min-height: 120px;
      white-space: pre-wrap;
      margin-top: 15px;
    }
    .small {
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Since1969zone Admin Panel</h1>
    <p class="small">URL me <code>?key=YOUR_ADMIN_KEY</code> hona chahiye.</p>

    <div class="row">
      <div>
        <label>Round Result</label>
        <select id="result">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
        </select>
      </div>
      <div>
        <label>Action</label>
        <button id="announceBtn">Announce Result</button>
      </div>
    </div>

    <button id="refreshBtn">Refresh Current Round</button>

    <div class="log" id="log">Admin ready...</div>
  </div>

  <script>
    function getKeyFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('key') || '';
    }

    async function refreshRound() {
      const log = document.getElementById('log');
      try {
        const res = await fetch('/api/round');
        const data = await res.json();
        log.textContent =
          'Current Round Info\\n\\n' +
          JSON.stringify(data, null, 2);
      } catch (err) {
        log.textContent = 'Round fetch failed: ' + err.message;
      }
    }

    async function announceResult() {
      const key = getKeyFromUrl();
      const result = document.getElementById('result').value;
      const log = document.getElementById('log');

      if (!key) {
        log.textContent = 'Missing admin key in URL.';
        return;
      }

      try {
        const res = await fetch('/api/admin/announce', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-key': key
          },
          body: JSON.stringify({ result: Number(result) })
        });

        const data = await res.json();
        log.textContent =
          'Announce Response\\n\\n' +
          JSON.stringify(data, null, 2);
      } catch (err) {
        log.textContent = 'Announce failed: ' + err.message;
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', refreshRound);
    document.getElementById('announceBtn').addEventListener('click', announceResult);

    refreshRound();
  </script>
</body>
</html>
